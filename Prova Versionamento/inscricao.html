<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="painel.css">
    <title>Inscrição ENEM</title>
</head>

<body>
    <header class="cabecalho">

        <div class="titulo">
            <h1>Inscrição ENEM</h1>
            <p>Bem-vindo ao sistema de inscrição do ENEM!</p>
        </div>

        <nav class="menu-navegacao">
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>

    </header>

    <main class="main">
        <div class="logo">
            <img src="enem.png" alt="Logo do ENEM">
        </div>
        </div>

        <h2>Faça sua inscrição para o ENEM!</h2>

        <div class="container-inscricao">
            <div class="inscricaocard">
                <h2>Preencha o formulário para se inscrever para o ENEM:</h2>

                <form id="inscricaoform">

                    <label for="idioma">Escolha o idioma para a prova:</label>
                    <select id="idioma" name="idioma">
                        <option value="inglês">Inglês</option>
                        <option value="espanhol">Espanhol</option>
                    </select>

                    <label for="local">Local da prova:</label>
                    <select id="local" name="local">
                        <option value="Acre">Acre</option>
                        <option value="Alagoas">Alagoas</option>
                        <option value="Amapá">Amapá</option>
                        <option value="Amazonas">Amazonas</option>
                        <option value="Bahia">Bahia</option>
                        <option value="Ceará">Ceará</option>
                        <option value="Distrito Federal">Distrito Federal</option>
                        <option value="Espírito Santo">Espírito Santo</option>
                        <option value="Goiás">Goiás</option>
                        <option value="Maranhão">Maranhão</option>
                        <option value="Mato Grosso">Mato Grosso</option>
                        <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
                        <option value="Minas Gerais">Minas Gerais</option>
                        <option value="Pará">Pará</option>
                        <option value="Paraíba">Paraíba</option>
                        <option value="Paraná">Paraná</option>
                        <option value="Pernambuco">Pernambuco</option>
                        <option value="Piauí">Piauí</option>
                        <option value="Rio de Janeiro">Rio de Janeiro</option>
                        <option value="Rio Grande do Norte">Rio Grande do Norte</option>
                        <option value="Rio Grande do Sul">Rio Grande do Sul</option>
                        <option value="Rondônia">Rondônia</option>
                        <option value="Roraima">Roraima</option>
                        <option value="Santa Catarina">Santa Catarina</option>
                        <option value="São Paulo">São Paulo</option>
                        <option value="Sergipe">Sergipe</option>
                        <option value="Tocantins">Tocantins</option>
                    </select>

                    <input type="text" id="cidade" placeholder="Cidade" required maxlength="19">

                    <label for="necessidades">Necessita de atendimento especializado?:</label>
                    <select id="necessidades" name="necessidades">
                        <option value="sim">Sim</option>
                        <option value="não">Não</option>
                    </select>

                    <button type="submit">Inscrever-se</button>

                </form>

                <p id="mensagem"></p>
            </div>
        </div>
    </main>
    <footer class="rodape">
        <p>© 2026 Exame Nacional do Ensino Médio ENEM</p>
        <p>Todos os direitos reservados</p>
    </footer>

    <script src="painel.js"></script>
</body>

</html>
