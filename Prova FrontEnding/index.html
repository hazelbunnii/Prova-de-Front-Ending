<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" type="text/css">
    <title>Inscrição ENEM</title>
</head>

<body>
    <header class="cabecalho">

        <div class="titulo">
            <h1>Bem-vindo ao site do ENEM!</h1>
        </div>

        <nav class="menu-navegacao">
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>

    </header>

    <main class="main">
     <div class="logo">
        <img src="enem.png" alt="Logo do gov.br">
     </div>

    <h2>Faça seu login para acessar o sistema de inscrição do ENEM</h2>

    <div class="container-login">
        <div class="logcard">
            <h2>Login</h2>

            <form id="logform">

                <div class="infologin">
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14">
                </div>

                <div class="infologin">
                    <input type="password" id="senha" placeholder="Senha">
                </div>

                <div class="check">
                    <input type="checkbox" id="remember">
                    <label for="remember">Lembre-me</label>
                </div>

                <button type="submit">Entrar</button>
                <div class="cadastro">
                <button onclick="window.location.href='cadastro.html';" type="button">Cadastrar-se</button>
                </div>
            </form>

            <p id="mensagem"></p>
        </div>
    </div>
    </main>

    <footer class="rodape">
        <p>© 2026 Exame Nacional do Ensino Médio ENEM</p>
        <p>Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
